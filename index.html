<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Katbghini?</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #fff;
  overflow: hidden;
}

img {
  width: 200px;
  margin-top: 50px;
}

h2 {
  margin-top: 20px;
}

button {
  padding: 10px 25px;
  border: none;
  background: #ff4d79;
  color: white;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  position: absolute;
}

#yes {
  position: static;
  margin-top: 20px;
}

#no {
  top: 300px;
  left: 50%;
}
</style>
</head>

<body>

<img src="https://i.imgur.com/4AiXzf8.png">

<h2>Katbghini? 🥺</h2>

<button id="yes" onclick="yes()">AH</button>
<button id="no">LA</button>

<script>
function yes() {
  alert("كنبغيييييك ازبي 😍🔥");
}

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});
</script>

</body>
</html>
